name: Publish to PyPI

# 打 tag 触发。使用 PyPI Trusted Publishing，仓库无需保存任何密钥。
# 首次发布前需在 https://pypi.org/manage/account/publishing/ 配置：
#   owner=xykong36  repo=cutmap  workflow=publish.yml  environment=pypi
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # Trusted Publishing 所需
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
